name: Build & Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      # Trigger on any app source change
      - "apps/midcurve-api/**"
      - "apps/midcurve-ui/**"
      - "apps/midcurve-signer/**"
      - "apps/midcurve-onchain-data/**"
      - "apps/midcurve-automation/**"
      - "apps/midcurve-business-logic/**"
      # Trigger on shared packages (affects all services)
      - "packages/**"
      # Trigger on workflow changes
      - ".github/workflows/build-images.yml"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Compute lowercase owner once, share via output
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ghcr.io/${{ steps.lower.outputs.owner }}/midcurve
    steps:
      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.service }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/midcurve-api/Dockerfile
          - service: ui
            dockerfile: apps/midcurve-ui/Dockerfile
          - service: signer
            dockerfile: apps/midcurve-signer/Dockerfile
          - service: onchain-data
            dockerfile: apps/midcurve-onchain-data/Dockerfile
          - service: automation
            dockerfile: apps/midcurve-automation/Dockerfile
          - service: business-logic
            dockerfile: apps/midcurve-business-logic/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.image_prefix }}-${{ matrix.service }}
          tags: |
            # latest on every main push
            type=raw,value=latest
            # immutable SHA tag for rollbacks
            type=sha,prefix=sha-,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR to speed up subsequent builds
          cache-from: type=registry,ref=${{ needs.prepare.outputs.image_prefix }}-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.image_prefix }}-${{ matrix.service }}:buildcache,mode=max
          provenance: false
