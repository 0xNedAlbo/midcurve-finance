name: PR Tests

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, typecheck & unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test @midcurve/shared
        run: pnpm --filter @midcurve/shared test:run

      - name: Test @midcurve/api-shared
        run: pnpm --filter @midcurve/api-shared test:run

      - name: Test @midcurve/mcp-server
        run: pnpm --filter @midcurve/mcp-server test:run
