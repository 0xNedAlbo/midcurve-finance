# Midcurve Finance - Railway / Self-Hosted Docker Compose
#
# Changes from production compose:
#   - Postgres added as internal service (replaces external AWS RDS)
#   - DATABASE_URL now points to internal postgres container
#   - backend network: internal: true removed (breaks Railway networking)
#   - Caddy removed for Railway (Railway handles SSL/routing natively)
#     → For pure self-hosted with your own domain, add Caddy back
#
# Railway deployment notes:
#   - Each service becomes a Railway Service in your project
#   - Volumes are provisioned as Railway Volumes automatically
#   - Internal hostnames (postgres, rabbitmq, etc.) work via Railway's private network
#   - Set all required env vars in Railway dashboard before first deploy
#
# Startup sequence (derived from depends_on):
#   1. postgres, rabbitmq          (no dependencies)
#   2. signer                      (needs postgres)
#   3. onchain-data                (needs postgres, rabbitmq)
#   4. automation, business-logic  (need postgres, rabbitmq, signer, onchain-data)
#   5. api                         (needs postgres, signer, automation)
#      → runs migrations + seeds on startup (contracts, accounts, tokens, allowlist)
#   6. ui                          (no runtime dependencies)
#
# Environment variables — REQUIRED (no defaults, must be set):
#   POSTGRES_PASSWORD              Postgres superuser password
#   RABBITMQ_PASS                  RabbitMQ password
#   SIGNER_INTERNAL_API_KEY        Shared secret between api/automation/business-logic and signer
#   SIGNER_LOCAL_ENCRYPTION_KEY    AES key for encrypting private keys at rest
#   CONFIG_PASSWORD                Password for the first-time config wizard
#   VITE_API_URL                   Public URL of the API (build-time arg for UI, e.g. https://yourdomain.com)
#   ALLOWED_ORIGINS                CORS allowed origins for API (e.g. https://yourdomain.com)
#
# NOTE: RPC URLs, API keys (Alchemy, The Graph, CoinGecko), WalletConnect project ID,
# and admin wallet address are now configured via the setup wizard and stored in the
# database. They are NO LONGER set as environment variables.
#
# Environment variables — OPTIONAL (have defaults or are chain-specific):
#   POSTGRES_USER                  default: midcurve
#   POSTGRES_DB                    default: midcurve
#   RABBITMQ_USER                  default: midcurve
#   COOKIE_DOMAIN                  default: empty (Railway domain works without this)
#   SIGNER_USE_LOCAL_KEYS          default: true
#   LOG_LEVEL                      default: info
#   UNISWAP_V3_SUBGRAPH_ID_ETHEREUM  default: Midcurve-managed subgraph
#   UNISWAP_V3_SUBGRAPH_ID_ARBITRUM  default: Midcurve-managed subgraph
#   UNISWAP_V3_SUBGRAPH_ID_BASE     default: Midcurve-managed subgraph
#   EXECUTION_FEE_RECIPIENT        Wallet address for automation fees (empty = no fees)
#   EXECUTION_FEE_BPS              default: 50 (0.5%)
#   MAX_POOLS_PER_CONNECTION       default: 1000
#   RECONNECT_DELAY_MS             default: 5000
#   MAX_RECONNECT_ATTEMPTS         default: 10
#   POLL_INTERVAL_MS               default: 5000
#   CLEANUP_INTERVAL_MS            default: 60000
#   STALE_THRESHOLD_MS             default: 60000
#   PRUNE_THRESHOLD_MS             default: 86400000
#   DEPLOY_POLL_INTERVAL_MS        default: 5000
#   ORDER_EXECUTOR_POOL_SIZE       default: 3
#
# Usage (self-hosted):
#   docker compose -f docker-compose.railway.yml up -d
#   # Migrations and seeds run automatically on API startup

services:

  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: midcurve-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-midcurve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-midcurve}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-midcurve} -d ${POSTGRES_DB:-midcurve}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - database

  # ============================================
  # MESSAGE BROKER
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: midcurve-rabbitmq
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-midcurve}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend

  # ============================================
  # SIGNING SERVICE (INTERNAL ONLY)
  # ============================================
  signer:
    image: ghcr.io/0xnedalbo/midcurve-signer:latest
    container_name: midcurve-signer
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-midcurve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-midcurve}
      - SIGNER_INTERNAL_API_KEY=${SIGNER_INTERNAL_API_KEY}
      - SIGNER_USE_LOCAL_KEYS=${SIGNER_USE_LOCAL_KEYS:-true}
      - SIGNER_LOCAL_ENCRYPTION_KEY=${SIGNER_LOCAL_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - database

  # ============================================
  # ONCHAIN DATA SERVICE
  # ============================================
  onchain-data:
    image: ghcr.io/0xnedalbo/midcurve-onchain-data:latest
    container_name: midcurve-onchain-data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-midcurve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-midcurve}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-midcurve}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      # Worker configuration
      - MAX_POOLS_PER_CONNECTION=${MAX_POOLS_PER_CONNECTION:-1000}
      - RECONNECT_DELAY_MS=${RECONNECT_DELAY_MS:-5000}
      - MAX_RECONNECT_ATTEMPTS=${MAX_RECONNECT_ATTEMPTS:-10}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-5000}
      - CLEANUP_INTERVAL_MS=${CLEANUP_INTERVAL_MS:-60000}
      - STALE_THRESHOLD_MS=${STALE_THRESHOLD_MS:-60000}
      - PRUNE_THRESHOLD_MS=${PRUNE_THRESHOLD_MS:-86400000}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
      - database

  # ============================================
  # AUTOMATION SERVICE
  # ============================================
  automation:
    image: ghcr.io/0xnedalbo/midcurve-automation:latest
    container_name: midcurve-automation
    expose:
      - "3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-midcurve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-midcurve}
      # RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-midcurve}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      # Signer
      - SIGNER_URL=http://signer:3003
      - SIGNER_INTERNAL_API_KEY=${SIGNER_INTERNAL_API_KEY}
      # Worker configuration
      - DEPLOY_POLL_INTERVAL_MS=${DEPLOY_POLL_INTERVAL_MS:-5000}
      - ORDER_EXECUTOR_POOL_SIZE=${ORDER_EXECUTOR_POOL_SIZE:-3}
      # Fee configuration
      - EXECUTION_FEE_RECIPIENT=${EXECUTION_FEE_RECIPIENT:-0x0000000000000000000000000000000000000000}
      - EXECUTION_FEE_BPS=${EXECUTION_FEE_BPS:-50}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      onchain-data:
        condition: service_started
      signer:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend
      - database

  # ============================================
  # BUSINESS LOGIC SERVICE
  # ============================================
  business-logic:
    image: ghcr.io/0xnedalbo/midcurve-business-logic:latest
    container_name: midcurve-business-logic
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-midcurve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-midcurve}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-midcurve}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      # Subgraph deployment IDs (hardcoded defaults)
      - UNISWAP_V3_SUBGRAPH_ID_ETHEREUM=${UNISWAP_V3_SUBGRAPH_ID_ETHEREUM:-5zvR82QoaXYFyDEKLZ9t6v9adgnptxYpKpSbxtgVENFV}
      - UNISWAP_V3_SUBGRAPH_ID_ARBITRUM=${UNISWAP_V3_SUBGRAPH_ID_ARBITRUM:-FbCGRftH4a3yZugY7TnbYgPJVEv2LvMT6oF1fxPe9aJM}
      - UNISWAP_V3_SUBGRAPH_ID_BASE=${UNISWAP_V3_SUBGRAPH_ID_BASE:-HMuAwufqZ1YCRmzL2SfHTVkzZovC9VL2UAKhjvRqKiR1}
      # Signer
      - SIGNER_URL=http://signer:3003
      - SIGNER_INTERNAL_API_KEY=${SIGNER_INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      signer:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend
      - database

  # ============================================
  # API SERVER
  # ============================================
  api:
    image: ghcr.io/0xnedalbo/midcurve-api:latest
    container_name: midcurve-api
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-midcurve}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-midcurve}
      # CORS & Cookies
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      # Config wizard password
      - CONFIG_PASSWORD=${CONFIG_PASSWORD}
      # Internal services
      - SIGNER_URL=http://signer:3003
      - SIGNER_INTERNAL_API_KEY=${SIGNER_INTERNAL_API_KEY}
      - AUTOMATION_URL=http://automation:3004
      # Subgraph deployment IDs (hardcoded defaults)
      - UNISWAP_V3_SUBGRAPH_ID_ETHEREUM=${UNISWAP_V3_SUBGRAPH_ID_ETHEREUM:-5zvR82QoaXYFyDEKLZ9t6v9adgnptxYpKpSbxtgVENFV}
      - UNISWAP_V3_SUBGRAPH_ID_ARBITRUM=${UNISWAP_V3_SUBGRAPH_ID_ARBITRUM:-FbCGRftH4a3yZugY7TnbYgPJVEv2LvMT6oF1fxPe9aJM}
      - UNISWAP_V3_SUBGRAPH_ID_BASE=${UNISWAP_V3_SUBGRAPH_ID_BASE:-HMuAwufqZ1YCRmzL2SfHTVkzZovC9VL2UAKhjvRqKiR1}
    depends_on:
      postgres:
        condition: service_healthy
      signer:
        condition: service_started
      automation:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
      - database

  # ============================================
  # FRONTEND
  # ============================================
  ui:
    build:
      context: .
      dockerfile: apps/midcurve-ui/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: midcurve-ui
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - frontend

# ============================================
# NETWORKS
# ============================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    # Note: internal: true removed — breaks Railway's service mesh.
    # Security is maintained by only attaching services that need
    # backend access to this network.
  database:
    driver: bridge

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres-data:
    driver: local
  rabbitmq-data:
    driver: local
