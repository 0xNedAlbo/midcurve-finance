# EVM Nodes — Reth + Lighthouse + Caddy Reverse Proxy
#
# Usage:
#   docker compose up -d
#   docker compose logs -f reth
#   docker compose logs -f lighthouse
#   docker compose logs -f caddy
#   docker compose down
#
# RPC Endpoints (extern, via Caddy):
#   HTTP:      https://nodes.midcurve.finance/ethereum/{API_KEY}
#   WebSocket: wss://nodes.midcurve.finance/ethereum/{API_KEY}/ws
#   Beacon:    https://nodes.midcurve.finance/ethereum/{API_KEY}/beacon
#
#   Arbitrum:
#   HTTP:      https://nodes.midcurve.finance/arbitrum/{API_KEY}
#   WebSocket: wss://nodes.midcurve.finance/arbitrum/{API_KEY}/ws

services:

  # ==========================================================================
  # EXECUTION CLIENT (Reth)
  # ==========================================================================
  reth:
    image: ${RETH_IMAGE:-ghcr.io/paradigmxyz/reth:v1.9.3}
    container_name: ethereum-reth
    restart: unless-stopped
    stop_grace_period: 3m
    command:
      - node
      - --chain=mainnet
      - --datadir=/data/reth
      - --full
      # HTTP RPC
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${RETH_HTTP_PORT:-8545}
      - --http.api=eth,net,web3,txpool,debug,trace
      - --http.corsdomain=*
      # WebSocket RPC
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${RETH_WS_PORT:-8546}
      - --ws.api=eth,net,web3,txpool,debug,trace
      - --ws.origins=*
      # Engine API (für Lighthouse)
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=${RETH_ENGINE_PORT:-8551}
      - --authrpc.jwtsecret=/jwt/jwt.hex
      # P2P
      - --port=${RETH_P2P_PORT:-30303}
      - --discovery.port=${RETH_P2P_PORT:-30303}
      # Performance
      - --rpc.gascap=${RETH_RPC_GAS_CAP:-50000000}
      # Metrics
      - --metrics=0.0.0.0:${RETH_METRICS_PORT:-9001}
    ports:
      # RPC/WS — nur localhost, Caddy proxied nach außen
      - "127.0.0.1:${RETH_HTTP_PORT:-8545}:${RETH_HTTP_PORT:-8545}"
      - "127.0.0.1:${RETH_WS_PORT:-8546}:${RETH_WS_PORT:-8546}"
      # Metrics — nur localhost
      - "0.0.0.0:${RETH_METRICS_PORT:-9001}:${RETH_METRICS_PORT:-9001}"
      # P2P — muss öffentlich erreichbar sein
      - "0.0.0.0:${RETH_P2P_PORT:-30303}:${RETH_P2P_PORT:-30303}/tcp"
      - "0.0.0.0:${RETH_P2P_PORT:-30303}:${RETH_P2P_PORT:-30303}/udp"
    volumes:
      - ethereum-reth-data:/data/reth
      - ./jwt.hex:/jwt/jwt.hex:ro
    networks:
      - engine-net
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/${RETH_HTTP_PORT:-8545}'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # CONSENSUS CLIENT (Lighthouse)
  # ==========================================================================
  lighthouse:
    image: ${LIGHTHOUSE_IMAGE:-sigp/lighthouse:v8.1.2}
    container_name: ethereum-lighthouse
    restart: unless-stopped
    stop_grace_period: 3m
    command:
      - lighthouse
      - bn
      - --network=mainnet
      - --datadir=/data/lighthouse
      # Checkpoint sync
      - --checkpoint-sync-url=${LIGHTHOUSE_CHECKPOINT_SYNC_URL:-https://beaconstate.ethstaker.cc}
      # Engine API
      - --execution-endpoint=http://reth:${RETH_ENGINE_PORT:-8551}
      - --execution-jwt=/jwt/jwt.hex
      # Beacon API
      - --http
      - --http-address=0.0.0.0
      - --http-port=${LIGHTHOUSE_HTTP_PORT:-5052}
      - --http-allow-origin=*
      # P2P
      - --port=${LIGHTHOUSE_P2P_PORT:-9000}
      - --discovery-port=${LIGHTHOUSE_P2P_PORT:-9000}
      - --target-peers=${LIGHTHOUSE_TARGET_PEERS:-80}
      # Metrics
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-port=${LIGHTHOUSE_METRICS_PORT:-9090}
    ports:
      # Beacon API — nur localhost
      - "127.0.0.1:${LIGHTHOUSE_HTTP_PORT:-5052}:${LIGHTHOUSE_HTTP_PORT:-5052}"
      # Metrics — nur localhost
      - "0.0.0.0:${LIGHTHOUSE_METRICS_PORT:-9090}:${LIGHTHOUSE_METRICS_PORT:-9090}"
      # P2P — muss öffentlich erreichbar sein
      - "0.0.0.0:${LIGHTHOUSE_P2P_PORT:-9000}:${LIGHTHOUSE_P2P_PORT:-9000}/tcp"
      - "0.0.0.0:${LIGHTHOUSE_P2P_PORT:-9000}:${LIGHTHOUSE_P2P_PORT:-9000}/udp"
    volumes:
      - ethereum-lighthouse-data:/data/lighthouse
      - ./jwt.hex:/jwt/jwt.hex:ro
    depends_on:
      reth:
        condition: service_started
    networks:
      - engine-net
      - proxy-net

  # ==========================================================================
  # ARBITRUM ONE (Nitro)
  # Snapshot-Init empfohlen: https://snapshot.arbitrum.foundation/arb1/nitro-archive.tar
  # ==========================================================================
  arbitrum-nitro:
    image: ${ARBITRUM_NITRO_IMAGE:-offchainlabs/nitro-node:v3.9.7-75e084e}
    container_name: arbitrum-nitro
    restart: unless-stopped
    stop_grace_period: 3m
    command:
      - --parent-chain.connection.url=${ARBITRUM_PARENT_CHAIN_URL:-http://ethereum-reth:8545}
      - --parent-chain.blob-client.beacon-url=${ARBITRUM_BEACON_URL:-http://ethereum-lighthouse:5052}
      - --chain.id=42161
      - --chain.name=arb1
      - --persistent.chain=/data/arbitrum
      - --init.latest=pruned
      - --http.addr=0.0.0.0
      - --http.port=${ARBITRUM_HTTP_PORT:-8547}
      - --http.api=net,web3,eth,arb
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws.addr=0.0.0.0
      - --ws.port=${ARBITRUM_WS_PORT:-8548}
      - --ws.api=net,web3,eth,arb
      - --ws.origins=*
      - --metrics
      - --metrics-server.addr=0.0.0.0
      - --metrics-server.port=${ARBITRUM_METRICS_PORT:-6070}
    ports:
      # RPC/WS — nur localhost, Caddy proxied nach außen
      - "127.0.0.1:${ARBITRUM_HTTP_PORT:-8547}:${ARBITRUM_HTTP_PORT:-8547}"
      - "127.0.0.1:${ARBITRUM_WS_PORT:-8548}:${ARBITRUM_WS_PORT:-8548}"
      # Metrics
      - "0.0.0.0:${ARBITRUM_METRICS_PORT:-6070}:${ARBITRUM_METRICS_PORT:-6070}"
    volumes:
      - arbitrum-nitro-data:/data/arbitrum
    depends_on:
      reth:
        condition: service_healthy
      lighthouse:
        condition: service_started
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/${ARBITRUM_HTTP_PORT:-8547}'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ==========================================================================
  # REVERSE PROXY (Caddy)
  # ==========================================================================
  caddy:
    image: caddy:latest
    container_name: midcurve-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"    # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file:
      - .env
    networks:
      - proxy-net

  # ==========================================================================
  # NODE EXPORTER
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - proxy-net

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  engine-net:
    # Interne Kommunikation Reth ↔ Lighthouse (Engine API)
    driver: bridge
    internal: true
  proxy-net:
    # Caddy ↔ Reth/Lighthouse (RPC)
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  ethereum-reth-data:
    driver: local
  ethereum-lighthouse-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  arbitrum-nitro-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/arbitrum
    